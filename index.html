<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Clue Notes - Digital notes and smart detective companion</title>
    <meta
      name="description"
      content="The ultimate interactive companion for Clue/Cluedo. Not just a sheet – a smart tracker with a Deduction Wizard to help you solve the crime faster. Works offline. Mobile friendly."
    />
    <meta
      name="keywords"
      content="digital clue notes, clue app, clue notes, cluedo sheet, cluedo solver, digital detective sheet, clue board game helper, board game companion, deduction wizard, board game apps, pwa"
    />

    <meta property="og:title" content="Clue Notes - Digital notes and smart detective companion" />
    <meta
      property="og:description"
      content="Don't just write notes. Use logic. Free offline web app with a built-in Deduction Wizard."
    />
    <meta property="og:image" content="https://cluenotes.netlify.app/oc.png" />
    <meta property="og:url" content="https://cluenotes.netlify.app" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clue Notes - Digital notes and smart detective companion" />

    <link rel="icon" type="image/svg+xml" href="/favicon-512.svg?v=1" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link
      rel="preload"
      href="/fonts/Nunito-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/Nunito-Bold.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/Nunito-Black.woff2" as="font" type="font/woff2" crossorigin />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <style>
      html {
        background: #a1a1a1;
        margin: 0;
        padding: 0;
        height: 100dvh;
        min-height: 568px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script
      data-goatcounter="https://cluenotesapp.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Clue Notes",
        "url": "https://cluenotes.netlify.app",
        "image": "https://cluenotes.netlify.app/android-chrome-512x512.png",
        "description": "Interactive detective sheet and logic tracker for Clue/Cluedo board games.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web Browser",
        "author": {
          "@type": "Person",
          "name": "Andrii Bondarets"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        featureList": [
          "Automated Deduction Wizard",
          "Manual Deduction Assist",
          "Offline support (PWA)",
          "Ad-free experience",
          "Custom game rules support"
        ]
      }
